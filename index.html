<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYDRAULIS ŌĆö Roman Water Organ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=DM+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&display=swap');

:root {
  --void:  #03020a;
  --deep:  #07050f;
  --murk:  #0d0a1a;
  --fog:   #151028;
  --mist:  #1e1830;
  --ecto:  #7affcc;
  --ecto2: #a8ffe0;
  --ecto3: #c8fff0;
  --ecto-dim: #0a2a1e;
  --soul:  #c060ff;
  --soul2: #e090ff;
  --bone:  #d4cfc0;
  --bone2: #e8e4d8;
  --blood: #ff2040;
  --rust:  #c84020;
  --water: #40c8ff;
  --water2:#80dfff;
  --water3:#b0eeff;
  --water-dim: #082030;
  --bronze:#c88040;
  --bronze2:#e0a860;
  --text:  #8a8598;
  --text2: #504860;
  --text3: #2a2438;
  --mono:  'DM Mono', monospace;
  --serif: 'Cormorant Garamond', serif;
  --goth:  'UnifrakturMaguntia', cursive;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: var(--void);
  overflow: hidden;
  font-family: var(--mono);
  cursor: none;
}

#cursor {
  position: fixed; width: 22px; height: 22px;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%, -50%);
}
#cursor svg { width: 100%; height: 100%; }

#atmos { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

#app {
  position: relative; width: 100vw; height: 100vh;
  display: flex; flex-direction: column; z-index: 1;
}

/* ŌöĆŌöĆ HEADER ŌöĆŌöĆ */
#hdr {
  flex-shrink: 0; padding: 18px 28px 14px;
  display: flex; align-items: baseline; gap: 18px;
  border-bottom: 1px solid var(--text3);
  background: linear-gradient(180deg, rgba(7,5,15,.95) 0%, transparent 100%);
  position: relative; z-index: 2;
}
#logo {
  font-family: var(--goth); font-size: 36px; color: var(--water);
  text-shadow: 0 0 20px var(--water), 0 0 60px rgba(64,200,255,.25);
  letter-spacing: 4px; line-height: 1;
}
#logo-sub {
  font-family: var(--mono); font-size: 9px; letter-spacing: 3px;
  color: var(--text3); text-transform: uppercase;
}
#hdr-stats { margin-left: auto; display: flex; align-items: center; gap: 14px; }
.hstat { font-family: var(--mono); font-size: 9px; letter-spacing: 1px; color: var(--text3); text-transform: uppercase; }
.hstat span { color: var(--text2); transition: color .1s; }
.hstat span.lit { color: var(--water2); text-shadow: 0 0 8px var(--water); }
.hstat span.lit-bronze { color: var(--bronze2); text-shadow: 0 0 8px var(--bronze); }
#power-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); transition: all .3s; }
#power-dot.on { background: var(--water); box-shadow: 0 0 8px var(--water), 0 0 20px rgba(64,200,255,.5); }

/* ŌöĆŌöĆ MAIN ŌöĆŌöĆ */
#main { flex: 1; display: flex; overflow: hidden; position: relative; }
#main::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(64,200,255,.014) 1px, transparent 1px),
    linear-gradient(90deg, rgba(64,200,255,.014) 1px, transparent 1px);
  background-size: 60px 50px; pointer-events: none;
}

/* ŌöĆŌöĆ ORGAN STAGE ŌöĆŌöĆ */
#organ-stage {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: 16px 20px 0; gap: 0;
  position: relative; z-index: 1; overflow: hidden;
}

/* ŌöĆŌöĆ PIPE RACK ŌöĆŌöĆ */
#pipe-rack {
  width: 100%; max-width: 780px;
  position: relative;
  flex-shrink: 0;
}

#pipe-svg {
  width: 100%; height: 200px;
  overflow: visible;
}

/* individual pipe glow on note */
.pipe-body { transition: fill .08s; }
.pipe-body.sounding { fill: rgba(64,200,255,.25) !important; }
.pipe-cap  { transition: stroke .08s; }
.pipe-cap.sounding  { stroke: var(--water2) !important; stroke-width: 2 !important; }
.pipe-smoke {
  opacity: 0; transition: opacity .15s;
  animation: none;
}
.pipe-smoke.on { opacity: 1; animation: smokrise 0.8s ease-out forwards; }
@keyframes smokrise {
  0%   { opacity: .6; transform: translateY(0)   scaleX(1); }
  100% { opacity: 0;  transform: translateY(-28px) scaleX(1.6); }
}

/* ŌöĆŌöĆ KEYBOARD SECTION ŌöĆŌöĆ */
#keyboard-section {
  width: 100%; max-width: 780px;
  flex-shrink: 0;
  position: relative;
}

#keyboard {
  display: flex;
  height: 100px;
  border: 1px solid var(--text3);
  border-radius: 0 0 4px 4px;
  overflow: hidden;
  position: relative;
  background: var(--deep);
}

.key {
  position: relative; cursor: pointer;
  flex-shrink: 0; transition: background .04s;
}
.key.white {
  background: linear-gradient(180deg, #0e0c1a 0%, #080610 100%);
  border-right: 1px solid var(--text3);
  flex: 1; z-index: 1;
}
.key.white:hover { background: linear-gradient(180deg,#181430 0%,#100e20 100%); }
.key.white.active {
  background: linear-gradient(180deg, var(--water2) 0%, var(--water) 100%) !important;
  box-shadow: inset 0 0 12px rgba(64,200,255,.4);
}
.key.black {
  background: linear-gradient(180deg,#04040e 0%,#08081a 100%);
  position: absolute; width: 60%; height: 58%; top: 0; z-index: 2;
  border-radius: 0 0 3px 3px;
  border: 1px solid var(--text3); border-top: none;
}
.key.black:hover { background: linear-gradient(180deg,#0e0c20 0%,#14122a 100%); }
.key.black.active {
  background: linear-gradient(180deg, var(--water-dim) 0%, #082030 100%) !important;
  box-shadow: 0 0 10px rgba(64,200,255,.3);
}
.key-lbl {
  position: absolute; bottom: 4px; left: 50%;
  transform: translateX(-50%);
  font-family: var(--mono); font-size: 7px; color: var(--text3);
  pointer-events: none; user-select: none;
}
.key.active .key-lbl { color: rgba(0,0,0,.4); }
.key.black .key-lbl { bottom: 4px; }

/* ŌöĆŌöĆ WATER CHAMBER ŌöĆŌöĆ */
#water-section {
  width: 100%; max-width: 780px;
  flex-shrink: 0;
  height: 60px;
  position: relative;
  border: 1px solid var(--text3);
  border-top: none;
  background: var(--void);
  overflow: hidden;
}

#water-canvas { width: 100%; height: 100%; display: block; }

/* water label */
#water-label {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%);
  font-family: var(--mono); font-size: 7px; letter-spacing: 2px;
  color: var(--text3); text-transform: uppercase; pointer-events: none;
}

/* pressure gauge */
#pressure-wrap {
  position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%);
  display: flex; align-items: center; gap: 6px;
}
#pressure-label { font-family: var(--mono); font-size: 7px; letter-spacing: 1px; color: var(--text3); text-transform: uppercase; }
#pressure-bar { width: 60px; height: 4px; background: var(--text3); border-radius: 2px; overflow: hidden; }
#pressure-fill { height: 100%; width: 0%; background: var(--water); border-radius: 2px; transition: width .1s; box-shadow: 0 0 4px var(--water); }

/* ŌöĆŌöĆ OCT WHEEL ŌöĆŌöĆ */
#oct-outer {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  position: absolute; left: -48px; top: 0;
}
#oct-wheel {
  width: 32px; height: 100px;
  background: var(--void); border: 1px solid var(--text3);
  border-radius: 4px; overflow: hidden; cursor: ns-resize;
  position: relative; user-select: none;
}
#oct-wheel-inner { position: absolute; top: 0; left: 0; right: 0; transition: transform .14s cubic-bezier(.22,.68,0,1.2); }
.ow-slot {
  height: 18px; display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 8px; color: var(--text3);
  border-bottom: 1px solid var(--text3); flex-shrink: 0;
}
.ow-slot.cur { color: var(--water); background: rgba(64,200,255,.06); border-color: var(--water-dim); }
#oct-wheel::before, #oct-wheel::after {
  content: ''; position: absolute; left: 0; right: 0; height: 12px; z-index: 2; pointer-events: none;
}
#oct-wheel::before { top: 0; background: linear-gradient(to bottom, var(--void), transparent); }
#oct-wheel::after  { bottom: 0; background: linear-gradient(to top, var(--void), transparent); }
#oct-lbl { font-family: var(--mono); font-size: 7px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }

/* ŌöĆŌöĆ WAVEFORM ŌöĆŌöĆ */
#wave-bar {
  flex-shrink: 0; height: 52px; background: var(--deep);
  border-top: 1px solid var(--text3);
  position: relative; z-index: 2; overflow: hidden;
}
#wave-canvas { width: 100%; height: 100%; display: block; }

/* ŌöĆŌöĆ CONTROLS ŌöĆŌöĆ */
#controls {
  flex-shrink: 0;
  background: linear-gradient(0deg, rgba(7,5,15,.98) 0%, transparent 100%);
  border-top: 1px solid var(--text3);
  padding: 10px 24px 14px;
  display: flex; align-items: center; gap: 20px;
  position: relative; z-index: 2; flex-wrap: wrap;
}
.cdiv { width: 1px; height: 32px; background: var(--text3); flex-shrink: 0; }
.kg { display: flex; flex-direction: column; align-items: center; gap: 3px; }
canvas.knob { cursor: ns-resize; display: block; }
.kl { font-family: var(--mono); font-size: 7px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); }
.kv { font-family: var(--mono); font-size: 9px; color: var(--text2); min-width: 32px; text-align: center; }

.voice-btn {
  font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  padding: 5px 12px; border: 1px solid var(--text3); border-radius: 3px;
  color: var(--text2); background: transparent; cursor: pointer; transition: all .15s;
}
.voice-btn:hover { color: var(--text); border-color: var(--text2); }
.voice-btn.active { color: var(--water2); border-color: var(--water); background: rgba(64,200,255,.06); text-shadow: 0 0 8px var(--water); }

.stop-btn {
  font-family: var(--serif); font-style: italic; font-size: 13px;
  color: var(--text2); background: transparent;
  border: 1px solid var(--text3); border-radius: 3px;
  padding: 3px 10px; cursor: pointer; transition: all .15s;
}
.stop-btn:hover { color: var(--bronze2); border-color: var(--bronze); }
.stop-btn.active { color: var(--bronze2); border-color: var(--bronze); background: rgba(200,128,64,.06); }

#note-display { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
#note-name {
  font-family: var(--serif); font-size: 26px; font-style: italic; font-weight: 300;
  color: var(--water2); text-shadow: 0 0 16px var(--water);
  line-height: 1; min-width: 60px; text-align: right; transition: color .05s;
}
#freq-display { font-family: var(--mono); font-size: 9px; color: var(--text2); letter-spacing: 1px; }

::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<!-- Cursor: water drop -->
<div id="cursor">
  <svg viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg">
    <path d="M11 3 C11 3 4 10 4 14 C4 18 7.1 20 11 20 C14.9 20 18 18 18 14 C18 10 11 3 11 3Z"
      fill="none" stroke="#40c8ff" stroke-width="1" opacity=".8"/>
    <path d="M8 15 C8 17 9.5 18 11 18" fill="none" stroke="#40c8ff" stroke-width=".8" opacity=".5" stroke-linecap="round"/>
  </svg>
</div>

<canvas id="atmos"></canvas>

<div id="app">
  <!-- HEADER -->
  <div id="hdr">
    <div>
      <div id="logo">Hydraulis</div>
      <div id="logo-sub">Roman Water Organ ┬Ę Ctesibius ┬Ę 246 BC</div>
    </div>
    <div id="hdr-stats">
      <div class="hstat">Note <span id="hs-note">ŌĆö</span></div>
      <div class="hstat">Freq <span id="hs-freq">ŌĆö</span></div>
      <div class="hstat">Pressure <span id="hs-pres">ŌĆö</span></div>
      <div id="power-dot"></div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="organ-stage">

      <!-- PIPE RACK -->
      <div id="pipe-rack">
        <svg id="pipe-svg" viewBox="0 0 780 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax meet">
          <defs>
            <filter id="pipe-glow">
              <feGaussianBlur stdDeviation="2" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <!-- Pipe rack base rail -->
          <rect x="10" y="188" width="760" height="6" rx="2"
            fill="none" stroke="rgba(64,200,255,.18)" stroke-width="1"/>
          <!-- Pipes drawn by JS -->
          <g id="pipes-group"></g>
        </svg>
      </div>

      <!-- KEYBOARD SECTION -->
      <div id="keyboard-section" style="position:relative;">
        <!-- Oct wheel -->
        <div id="oct-outer">
          <div id="oct-wheel"><div id="oct-wheel-inner"></div></div>
          <div id="oct-lbl">Oct</div>
        </div>
        <div id="keyboard"></div>
      </div>

      <!-- WATER CHAMBER -->
      <div id="water-section">
        <canvas id="water-canvas"></canvas>
        <div id="water-label">Hydra ┬Ę Water Pressure Chamber</div>
        <div id="pressure-wrap">
          <div id="pressure-label">Pres</div>
          <div id="pressure-bar"><div id="pressure-fill"></div></div>
        </div>
      </div>

    </div>
  </div>

  <!-- WAVEFORM -->
  <div id="wave-bar"><canvas id="wave-canvas"></canvas></div>

  <!-- CONTROLS -->
  <div id="controls">
    <!-- Register (pipe stop) -->
    <div style="display:flex;gap:5px;flex-direction:column;">
      <div style="font-family:var(--mono);font-size:8px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:2px;">Register</div>
      <div style="display:flex;gap:4px;">
        <button class="voice-btn active" data-reg="principal">Principal</button>
        <button class="voice-btn" data-reg="tibia">Tibia</button>
        <button class="voice-btn" data-reg="bombarde">Bombarde</button>
        <button class="voice-btn" data-reg="mixture">Mixture</button>
      </div>
    </div>

    <div class="cdiv"></div>

    <!-- Stops -->
    <div style="display:flex;flex-direction:column;gap:4px;">
      <div style="font-family:var(--mono);font-size:8px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;">Stops</div>
      <div style="display:flex;gap:4px;">
        <button class="stop-btn active" data-stop="tremulant">Tremulant</button>
        <button class="stop-btn active" data-stop="hydraulus">Hydraulus</button>
        <button class="stop-btn" data-stop="drone">Drone</button>
      </div>
    </div>

    <div class="cdiv"></div>

    <!-- Knobs -->
    <div class="kg">
      <canvas class="knob" id="k-reverb"  width="42" height="42" data-min="0"   data-max="1"   data-val="0.55" data-color="#40c8ff"></canvas>
      <div class="kl">Reverb</div><div class="kv" id="v-reverb">0.55</div>
    </div>
    <div class="kg">
      <canvas class="knob" id="k-water"   width="42" height="42" data-min="0"   data-max="1"   data-val="0.45" data-color="#80dfff"></canvas>
      <div class="kl">Wobble</div><div class="kv" id="v-water">0.45</div>
    </div>
    <div class="kg">
      <canvas class="knob" id="k-tone"    width="42" height="42" data-min="0"   data-max="1"   data-val="0.5"  data-color="#c88040"></canvas>
      <div class="kl">Tone</div><div class="kv" id="v-tone">0.50</div>
    </div>
    <div class="kg">
      <canvas class="knob" id="k-mix"     width="42" height="42" data-min="0"   data-max="1"   data-val="0.3"  data-color="#e090ff"></canvas>
      <div class="kl">Mix</div><div class="kv" id="v-mix">0.30</div>
    </div>

    <div class="cdiv"></div>

    <div id="note-display">
      <div id="note-name">ŌĆö</div>
      <div id="freq-display">ŌĆö Hz</div>
    </div>
  </div>
</div>

<script>
// ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
// HYDRAULIS ŌĆö Roman Water Organ
// Invented by Ctesibius of Alexandria, c.246 BC
// ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ

let actx = null, convolver = null, analyser = null;
// Active voices: noteNum ŌåÆ { oscs, gains, lfo, nodes }
const activeVoices = new Map();
let droneOsc = null, droneGain = null;

function getCtx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  if (!convolver) buildReverb();
  if (!analyser) {
    analyser = actx.createAnalyser(); analyser.fftSize = 512;
    analyser.connect(actx.destination);
  }
  return actx;
}

const P = {
  reverb: 0.55, water: 0.45, tone: 0.5, mix: 0.3,
  register: 'principal',
  tremulant: true, hydraulus: true, drone: false,
};

// ŌöĆŌöĆ Reverb: stone cistern / amphitheatre acoustics ŌöĆŌöĆ
function buildReverb() {
  const c = actx;
  const len = c.sampleRate * 3.5;
  const buf = c.createBuffer(2, len, c.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    // Stone room early reflections + long decay
    for (let i = 0; i < len; i++) {
      const env = Math.pow(1 - i/len, 1.4);
      d[i] = (Math.random()*2-1) * env;
      // Add sparse early reflections
      if (i < c.sampleRate * 0.08 && Math.random() < 0.002) {
        d[i] += (Math.random()*2-1) * 0.8;
      }
    }
  }
  if (convolver) try { convolver.disconnect(); } catch(e) {}
  convolver = c.createConvolver(); convolver.buffer = buf;
  convolver.connect(c.destination);
}

function midiToFreq(n) { return 440 * Math.pow(2, (n-69)/12); }

const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function noteName(midi) { return NOTE_NAMES[midi%12] + Math.floor(midi/12-1); }

// ŌöĆŌöĆ REGISTER SYNTHESIS ŌöĆŌöĆ
// Each register = different pipe character

function buildVoice(c, freq, vel, now) {
  const reg = P.register;
  const nodes = [];
  const masterGain = c.createGain();

  // ŌöĆŌöĆ Water wobble LFO (the hydraulis wobble) ŌöĆŌöĆ
  // Water pressure is stable but not perfectly so
  const lfo = c.createOscillator();
  lfo.frequency.value = 4.8 + Math.random() * 0.6; // slight variation per note
  const lfoDepth = c.createGain();
  // wobble amount scales with P.water
  lfoDepth.gain.value = P.water * 5.5;

  // ŌöĆŌöĆ Hydraulus burble: second very slow LFO for pressure swell ŌöĆŌöĆ
  let burlLFO = null, burlG = null;
  if (P.hydraulus) {
    burlLFO = c.createOscillator();
    burlLFO.frequency.value = 0.28 + Math.random() * 0.15;
    burlG = c.createGain();
    burlG.gain.value = P.water * 0.04;
    burlLFO.connect(burlG);
    nodes.push(burlLFO);
  }

  switch(reg) {

    case 'principal': {
      // Open metal flue pipe ŌĆö bright, clear, slightly nasal
      // Mix of sawtooth body + hollow 2nd harmonic
      const osc1 = c.createOscillator(); osc1.type = 'sawtooth';
      osc1.frequency.value = freq;
      lfo.connect(lfoDepth); lfoDepth.connect(osc1.frequency);
      if (burlG) burlG.connect(osc1.frequency);

      const osc2 = c.createOscillator(); osc2.type = 'square';
      osc2.frequency.value = freq;
      osc2.detune.value = 1.2; // tiny bit of beating
      const osc2g = c.createGain(); osc2g.gain.value = 0.18;

      // Pipe tone: bandpass around 2nd-3rd partial
      const f1 = c.createBiquadFilter(); f1.type = 'bandpass';
      f1.frequency.value = freq * (2 + P.tone * 2); f1.Q.value = 1.2;
      // High cut for pipe tone
      const lpf = c.createBiquadFilter(); lpf.type = 'lowpass';
      lpf.frequency.value = 3200 + P.tone * 4000;

      const eg = c.createGain();
      eg.gain.setValueAtTime(0, now);
      eg.gain.linearRampToValueAtTime(vel * 0.65, now + 0.03); // pipe speech
      if (burlG) burlG.connect(eg.gain);

      osc1.connect(f1); f1.connect(lpf); lpf.connect(eg); eg.connect(masterGain);
      osc2.connect(osc2g); osc2g.connect(eg);
      nodes.push(osc1, osc2);
      break;
    }

    case 'tibia': {
      // Hollow flute-like tibia pipe ŌĆö more open, airy, pure
      const osc1 = c.createOscillator(); osc1.type = 'triangle';
      osc1.frequency.value = freq;
      lfo.connect(lfoDepth); lfoDepth.connect(osc1.frequency);
      if (burlG) burlG.connect(osc1.frequency);

      // Air turbulence at pipe mouth
      const nBuf = c.createBuffer(1, c.sampleRate*0.5, c.sampleRate);
      const nd = nBuf.getChannelData(0);
      for (let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;
      const nSrc = c.createBufferSource(); nSrc.buffer=nBuf; nSrc.loop=true;
      const nBpf = c.createBiquadFilter(); nBpf.type='bandpass';
      nBpf.frequency.value = freq * 1.5; nBpf.Q.value = 8;
      const nGain = c.createGain(); nGain.gain.value = vel * 0.06 * P.water;
      nSrc.connect(nBpf); nBpf.connect(nGain);

      // Gentle 2nd harmonic body
      const osc2 = c.createOscillator(); osc2.type = 'sine';
      osc2.frequency.value = freq * 2;
      const og2 = c.createGain(); og2.gain.value = 0.12;

      const lpf = c.createBiquadFilter(); lpf.type = 'lowpass';
      lpf.frequency.value = 2400 + P.tone * 3000;

      const eg = c.createGain();
      eg.gain.setValueAtTime(0, now);
      eg.gain.linearRampToValueAtTime(vel * 0.55, now + 0.055);
      if (burlG) burlG.connect(eg.gain);

      osc1.connect(lpf); nGain.connect(lpf); lpf.connect(eg); eg.connect(masterGain);
      osc2.connect(og2); og2.connect(eg);
      nSrc.start(now); nSrc.stop(now + 60); // stopped when voice ends
      nodes.push(osc1, osc2, nSrc);
      break;
    }

    case 'bombarde': {
      // Reed-like bombarde: reedy, buzzy, penetrating
      const osc1 = c.createOscillator(); osc1.type = 'sawtooth';
      osc1.frequency.value = freq;
      lfo.connect(lfoDepth); lfoDepth.connect(osc1.frequency);
      if (burlG) burlG.connect(osc1.frequency);

      // Waveshaper for reed buzz
      const ws = c.createWaveShaper();
      const k = 20 + P.tone * 40;
      const curve = new Float32Array(256);
      for (let i=0;i<256;i++) { const x=i*2/256-1; curve[i]=(Math.PI+k)*x/(Math.PI+k*Math.abs(x)); }
      ws.curve = curve;

      // Reed resonant bandpass
      const bpf = c.createBiquadFilter(); bpf.type='bandpass';
      bpf.frequency.value = freq * (1.8 + P.tone * 2.5); bpf.Q.value = 2.8;

      // Sub tone for chest
      const sub = c.createOscillator(); sub.type='sine'; sub.frequency.value=freq*0.5;
      const subG = c.createGain(); subG.gain.value=0.25;

      const eg = c.createGain();
      eg.gain.setValueAtTime(0, now);
      eg.gain.linearRampToValueAtTime(vel * 0.7, now + 0.018);
      if (burlG) burlG.connect(eg.gain);

      osc1.connect(ws); ws.connect(bpf); bpf.connect(eg); eg.connect(masterGain);
      sub.connect(subG); subG.connect(eg);
      nodes.push(osc1, sub);
      break;
    }

    case 'mixture': {
      // Mixture stop: multiple ranks, octaves + quint
      const ranks = [1, 2, 3, 1.5]; // unison, oct, 2nd oct, quint
      const amps  = [0.5, 0.28, 0.16, 0.18];
      const types = ['sawtooth','triangle','sine','sine'];
      ranks.forEach((r, i) => {
        const osc = c.createOscillator(); osc.type = types[i];
        osc.frequency.value = freq * r;
        osc.detune.value = (Math.random()-0.5) * 2.5;
        if (i === 0) { lfo.connect(lfoDepth); lfoDepth.connect(osc.frequency); }
        if (burlG && i === 0) burlG.connect(osc.frequency);
        const og = c.createGain(); og.gain.value = amps[i] * vel;
        const lpf = c.createBiquadFilter(); lpf.type='lowpass';
        lpf.frequency.value = 4000 + P.tone*3000 - i*400;
        osc.connect(lpf); lpf.connect(og); og.connect(masterGain);
        nodes.push(osc);
      });
      // Envelope on master
      masterGain.gain.setValueAtTime(0, now);
      masterGain.gain.linearRampToValueAtTime(1, now + 0.025);
      if (burlG) burlG.connect(masterGain.gain);
      break;
    }
  }

  // Attack envelope for non-mixture registers
  if (reg !== 'mixture') {
    // masterGain just passes through; individual eg controls attack
  }

  // Tremulant: amplitude wobble (organ tremulant stop)
  if (P.tremulant) {
    const trem = c.createOscillator(); trem.frequency.value = 5.5 + Math.random()*0.3;
    const tremG = c.createGain(); tremG.gain.value = P.water * 0.08;
    trem.connect(tremG); tremG.connect(masterGain.gain);
    trem.start(now); nodes.push(trem);
  }

  // Route
  const dry = c.createGain(); dry.gain.value = 1 - P.reverb * 0.8;
  const wet = c.createGain(); wet.gain.value = P.reverb * 0.8;
  masterGain.connect(dry); dry.connect(analyser);
  masterGain.connect(wet); wet.connect(convolver);

  lfo.start(now); nodes.push(lfo, lfoDepth);
  if (burlLFO) { burlLFO.start(now); }

  nodes.forEach(n => { if (n.start && !n._started) { try { n.start(now); n._started=true; } catch(e){} } });

  return { masterGain, nodes, dry, wet };
}

function startNote(noteNum, vel=0.75) {
  if (activeVoices.has(noteNum)) return;
  const c = getCtx();
  const freq = midiToFreq(noteNum);
  const now = c.currentTime;

  const voice = buildVoice(c, freq, vel, now);
  activeVoices.set(noteNum, voice);

  // Update UI
  updateDisplay(noteNum, freq);
  activatePipeVisual(noteNum);
  updatePressure(activeVoices.size);

  // Drone: if on, add sub-bass pipe for this note
  if (P.drone && !droneOsc) {
    droneOsc = c.createOscillator(); droneOsc.type = 'sine';
    droneOsc.frequency.value = midiToFreq(noteNum - 12);
    droneGain = c.createGain(); droneGain.gain.value = 0.18;
    droneOsc.connect(droneGain); droneGain.connect(analyser);
    droneOsc.start(now);
  }
}

function stopNote(noteNum) {
  const voice = activeVoices.get(noteNum);
  if (!voice) return;
  const c = actx;
  const now = c.currentTime;

  // Release
  voice.masterGain.gain.setTargetAtTime(0, now, 0.06);
  setTimeout(() => {
    voice.nodes.forEach(n => { try { n.stop(); } catch(e){} });
    try { voice.masterGain.disconnect(); voice.dry.disconnect(); voice.wet.disconnect(); } catch(e){}
  }, 400);

  activeVoices.delete(noteNum);
  deactivatePipeVisual(noteNum);
  updatePressure(activeVoices.size);

  if (P.drone && droneOsc && activeVoices.size === 0) {
    try { droneOsc.stop(now + 0.3); } catch(e){}
    droneOsc = null; droneGain = null;
  }
}

function updateDisplay(noteNum, freq) {
  const name = noteName(noteNum);
  document.getElementById('note-name').textContent = NOTE_NAMES[noteNum%12];
  document.getElementById('freq-display').textContent = Math.round(freq) + ' Hz';
  document.getElementById('hs-note').textContent = name;
  document.getElementById('hs-freq').textContent = Math.round(freq) + ' Hz';
  ['hs-note','hs-freq'].forEach(id => {
    const el=document.getElementById(id); el.classList.add('lit');
    clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('lit'),400);
  });
  document.getElementById('power-dot').classList.add('on');
  clearTimeout(window._dotT);
  window._dotT = setTimeout(()=>{ if(activeVoices.size===0) document.getElementById('power-dot').classList.remove('on'); },300);
}

// ŌöĆŌöĆ PIPE VISUALS ŌöĆŌöĆ
const NUM_PIPES = 17; // visible pipes (chromatic display)
const WHITE_KEYS  = [0,2,4,5,7,9,11];
const BLACK_SLOTS = [1,3,null,6,8,10,null];

function buildPipeSVG() {
  const g = document.getElementById('pipes-group');
  g.innerHTML = '';

  const totalW = 760;
  const pipeW = totalW / NUM_PIPES;

  for (let i = 0; i < NUM_PIPES; i++) {
    const t = i / (NUM_PIPES - 1);
    // Height: tall bass, short treble (like a real pipe organ)
    const h = 180 - t * 140;
    const x = 10 + i * pipeW + pipeW * 0.2;
    const w = pipeW * 0.55;
    const y = 188 - h;
    const isBlack = [1,3,6,8,10,13,15].includes(i);

    // Pipe body
    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x', x); rect.setAttribute('y', y);
    rect.setAttribute('width', w); rect.setAttribute('height', h);
    rect.setAttribute('rx', '1.5');
    rect.setAttribute('fill', isBlack ? 'rgba(30,24,48,.6)' : 'rgba(40,32,60,.4)');
    rect.setAttribute('stroke', 'rgba(64,200,255,.18)');
    rect.setAttribute('stroke-width', '0.7');
    rect.setAttribute('class', 'pipe-body');
    rect.setAttribute('id', `pipe-body-${i}`);
    g.appendChild(rect);

    // Pipe mouth (rectangular slot near bottom)
    const mouthH = Math.max(3, h * 0.06);
    const mouth = document.createElementNS('http://www.w3.org/2000/svg','rect');
    mouth.setAttribute('x', x); mouth.setAttribute('y', y + h - mouthH - 4);
    mouth.setAttribute('width', w); mouth.setAttribute('height', mouthH);
    mouth.setAttribute('fill', 'rgba(64,200,255,.1)');
    mouth.setAttribute('stroke', 'rgba(64,200,255,.2)');
    mouth.setAttribute('stroke-width', '0.5');
    g.appendChild(mouth);

    // Pipe cap / top lip
    const cap = document.createElementNS('http://www.w3.org/2000/svg','line');
    cap.setAttribute('x1', x-1); cap.setAttribute('y1', y);
    cap.setAttribute('x2', x+w+1); cap.setAttribute('y2', y);
    cap.setAttribute('stroke', 'rgba(64,200,255,.35)');
    cap.setAttribute('stroke-width', '1.5');
    cap.setAttribute('stroke-linecap', 'round');
    cap.setAttribute('class', 'pipe-cap');
    cap.setAttribute('id', `pipe-cap-${i}`);
    g.appendChild(cap);

    // Bronze flange rings on taller pipes
    if (h > 80) {
      [0.3, 0.6].forEach(frac => {
        const fy = y + h * frac;
        const ring = document.createElementNS('http://www.w3.org/2000/svg','line');
        ring.setAttribute('x1', x); ring.setAttribute('y1', fy);
        ring.setAttribute('x2', x+w); ring.setAttribute('y2', fy);
        ring.setAttribute('stroke', 'rgba(200,128,64,.25)');
        ring.setAttribute('stroke-width', '1');
        g.appendChild(ring);
      });
    }

    // Smoke / air puff (sounding indicator)
    const smoke = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
    smoke.setAttribute('cx', x + w/2); smoke.setAttribute('cy', y - 4);
    smoke.setAttribute('rx', w * 0.4); smoke.setAttribute('ry', 3);
    smoke.setAttribute('fill', 'rgba(64,200,255,.4)');
    smoke.setAttribute('class', 'pipe-smoke');
    smoke.setAttribute('id', `pipe-smoke-${i}`);
    g.appendChild(smoke);
  }
}

// Map noteNum ŌåÆ closest pipe index (visual only)
function noteToVisualPipe(noteNum) {
  return ((noteNum % 12) + Math.floor(noteNum/12) * 5) % NUM_PIPES;
}

function activatePipeVisual(noteNum) {
  const i = noteToVisualPipe(noteNum);
  const body  = document.getElementById(`pipe-body-${i}`);
  const cap   = document.getElementById(`pipe-cap-${i}`);
  const smoke = document.getElementById(`pipe-smoke-${i}`);
  if (body)  body.classList.add('sounding');
  if (cap)   cap.classList.add('sounding');
  if (smoke) {
    smoke.classList.remove('on');
    void smoke.offsetWidth;
    smoke.classList.add('on');
    setTimeout(() => smoke.classList.remove('on'), 850);
  }
}

function deactivatePipeVisual(noteNum) {
  const i = noteToVisualPipe(noteNum);
  const body = document.getElementById(`pipe-body-${i}`);
  const cap  = document.getElementById(`pipe-cap-${i}`);
  if (body) body.classList.remove('sounding');
  if (cap)  cap.classList.remove('sounding');
}

// ŌöĆŌöĆ PRESSURE GAUGE ŌöĆŌöĆ
function updatePressure(voices) {
  const pct = Math.min(100, voices * 22 + (voices > 0 ? 20 : 0));
  document.getElementById('pressure-fill').style.width = pct + '%';
  const label = voices === 0 ? 'ŌĆö' : voices + ' pipe' + (voices>1?'s':'');
  document.getElementById('hs-pres').textContent = label;
  const el=document.getElementById('hs-pres');
  el.classList.add('lit-bronze');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('lit-bronze'),400);
}

// ŌöĆŌöĆ WATER ANIMATION ŌöĆŌöĆ
const waterCanvas = document.getElementById('water-canvas');
const waterCtx = waterCanvas.getContext('2d');
let waterT = 0;

function resizeWater() {
  waterCanvas.width = waterCanvas.offsetWidth;
  waterCanvas.height = waterCanvas.offsetHeight;
}

function drawWater() {
  requestAnimationFrame(drawWater);
  const W = waterCanvas.width, H = waterCanvas.height;
  waterCtx.clearRect(0,0,W,H);

  waterT += 0.018;
  const voices = activeVoices.size;
  const agitation = voices * 0.4;
  const baseLevel = H * 0.55;

  // Draw water surface
  waterCtx.beginPath();
  waterCtx.moveTo(0, H);
  for (let x = 0; x <= W; x += 3) {
    const wave1 = Math.sin(x * 0.025 + waterT * 1.8) * (3 + agitation * 2.5);
    const wave2 = Math.sin(x * 0.04  + waterT * 2.4 + 1) * (1.5 + agitation);
    const wave3 = Math.sin(x * 0.012 + waterT * 1.1) * (2 + agitation * 1.5);
    const y = baseLevel + wave1 + wave2 + wave3;
    x === 0 ? waterCtx.moveTo(x, y) : waterCtx.lineTo(x, y);
  }
  waterCtx.lineTo(W, H); waterCtx.lineTo(0, H); waterCtx.closePath();
  waterCtx.fillStyle = `rgba(64,200,255,${0.06 + agitation * 0.04})`;
  waterCtx.fill();

  // Surface highlight line
  waterCtx.beginPath();
  for (let x = 0; x <= W; x += 3) {
    const wave1 = Math.sin(x * 0.025 + waterT * 1.8) * (3 + agitation * 2.5);
    const wave2 = Math.sin(x * 0.04  + waterT * 2.4 + 1) * (1.5 + agitation);
    const y = baseLevel + wave1 + wave2;
    x === 0 ? waterCtx.moveTo(x, y) : waterCtx.lineTo(x, y);
  }
  waterCtx.strokeStyle = `rgba(128,223,255,${0.25 + agitation * 0.15})`;
  waterCtx.lineWidth = 1;
  waterCtx.stroke();

  // Bubbles when playing
  if (voices > 0 && Math.random() < 0.06 * voices) {
    const bx = Math.random() * W;
    const by = baseLevel + Math.random() * (H - baseLevel);
    waterCtx.beginPath();
    waterCtx.arc(bx, by, Math.random()*2.5+0.5, 0, Math.PI*2);
    waterCtx.strokeStyle = 'rgba(128,223,255,.35)';
    waterCtx.lineWidth = 0.6;
    waterCtx.stroke();
  }
}

// ŌöĆŌöĆ KEYBOARD ŌöĆŌöĆ
const KB_WHITE = {a:0,s:1,d:2,f:3,g:4,h:5,j:6,k:7};
const KB_BLACK = {w:0,e:1,t:3,y:4,u:5};
let kbOctave = 4;
const KB_OCT_MIN = 1, KB_OCT_MAX = 7, KB_SLOT_H = 18;

function buildKeyboard() {
  const el = document.getElementById('keyboard');
  el.innerHTML = '';
  const base = kbOctave * 12 + 12;
  for (let i = 0; i < 8; i++) {
    const n = base + WHITE_KEYS[i % 7];
    const wk = document.createElement('div');
    wk.className = 'key white'; wk.dataset.note = n;
    wk.innerHTML = `<span class="key-lbl">${['A','S','D','F','G','H','J','K'][i]}</span>`;
    el.appendChild(wk);
  }
  requestAnimationFrame(() => {
    el.querySelectorAll('.key.white').forEach((wk, i) => {
      const slot = BLACK_SLOTS[i % 7]; if (slot == null) return;
      const n = base + slot;
      const bk = document.createElement('div'); bk.className = 'key black'; bk.dataset.note = n;
      bk.style.left = (wk.offsetLeft + wk.offsetWidth * 0.6) + 'px';
      const lbls = ['W','E','','T','Y','U',''];
      if (lbls[i]) bk.innerHTML = `<span class="key-lbl">${lbls[i]}</span>`;
      el.appendChild(bk);
    });
    el.querySelectorAll('.key').forEach(k => {
      k.addEventListener('mousedown',  e => { e.preventDefault(); getCtx(); startNote(parseInt(k.dataset.note)); k.classList.add('active'); });
      k.addEventListener('mouseup',    ()=> { stopNote(parseInt(k.dataset.note)); k.classList.remove('active'); });
      k.addEventListener('mouseleave', ()=> { const n=parseInt(k.dataset.note); if(activeVoices.has(n)){stopNote(n);k.classList.remove('active');} });
      k.addEventListener('touchstart', e=>{ e.preventDefault(); e.stopPropagation(); getCtx(); startNote(parseInt(k.dataset.note)); k.classList.add('active');},{passive:false});
      k.addEventListener('touchend',   e=>{ e.preventDefault(); stopNote(parseInt(k.dataset.note)); k.classList.remove('active');},{passive:false});
    });
  });
}

function buildOctWheel() {
  const inner = document.getElementById('oct-wheel-inner');
  inner.innerHTML = '';
  for (let o = KB_OCT_MAX; o >= KB_OCT_MIN; o--) {
    const s = document.createElement('div');
    s.className = 'ow-slot' + (o === kbOctave ? ' cur' : '');
    s.textContent = 'C'+o; s.dataset.oct = o;
    inner.appendChild(s);
  }
  scrollOctWheel();
}

function scrollOctWheel() {
  const inner = document.getElementById('oct-wheel-inner');
  const wH = document.getElementById('oct-wheel').clientHeight || 100;
  inner.style.transform = `translateY(${wH/2 - KB_SLOT_H/2 - (KB_OCT_MAX - kbOctave) * KB_SLOT_H}px)`;
  inner.querySelectorAll('.ow-slot').forEach(s => s.classList.toggle('cur', parseInt(s.dataset.oct) === kbOctave));
}

(function() {
  const wheel = document.getElementById('oct-wheel');
  let sy=null,so=null;
  wheel.addEventListener('mousedown', e=>{sy=e.clientY;so=kbOctave;e.preventDefault();});
  document.addEventListener('mousemove', e=>{
    if(sy===null)return;
    const d=Math.round((sy-e.clientY)/KB_SLOT_H);
    const n=Math.max(KB_OCT_MIN,Math.min(KB_OCT_MAX,so+d));
    if(n!==kbOctave){kbOctave=n;scrollOctWheel();buildKeyboard();}
  });
  document.addEventListener('mouseup',()=>{sy=null;});
  wheel.addEventListener('wheel',e=>{
    e.preventDefault();
    kbOctave=Math.max(KB_OCT_MIN,Math.min(KB_OCT_MAX,kbOctave+(e.deltaY>0?-1:1)));
    scrollOctWheel();buildKeyboard();
  },{passive:false});
  wheel.addEventListener('click',e=>{
    const s=e.target.closest('.ow-slot');
    if(s){kbOctave=parseInt(s.dataset.oct);scrollOctWheel();buildKeyboard();}
  });
})();

// Computer keyboard
document.addEventListener('keydown', e => {
  if (e.repeat || e.target.tagName==='INPUT') return;
  const key = e.key.toLowerCase();
  if (key==='z'){kbOctave=Math.max(KB_OCT_MIN,kbOctave-1);scrollOctWheel();buildKeyboard();return;}
  if (key==='x'){kbOctave=Math.min(KB_OCT_MAX,kbOctave+1);scrollOctWheel();buildKeyboard();return;}
  const base=kbOctave*12+12; let n=null;
  if (KB_WHITE[key]!==undefined) n=base+WHITE_KEYS[KB_WHITE[key]];
  else if (KB_BLACK[key]!==undefined) { const s=BLACK_SLOTS[KB_BLACK[key]]; if(s!=null) n=base+s; }
  if (n!==null && !activeVoices.has(n)) {
    getCtx(); startNote(n);
    document.getElementById('keyboard')?.querySelectorAll('.key').forEach(k=>{if(parseInt(k.dataset.note)===n)k.classList.add('active');});
  }
});
document.addEventListener('keyup', e => {
  const key=e.key.toLowerCase(); const base=kbOctave*12+12; let n=null;
  if (KB_WHITE[key]!==undefined) n=base+WHITE_KEYS[KB_WHITE[key]];
  else if (KB_BLACK[key]!==undefined){const s=BLACK_SLOTS[KB_BLACK[key]];if(s!=null)n=base+s;}
  if (n!==null) {
    stopNote(n);
    document.getElementById('keyboard')?.querySelectorAll('.key').forEach(k=>{if(parseInt(k.dataset.note)===n)k.classList.remove('active');});
  }
});

// ŌöĆŌöĆ REGISTER + STOP BUTTONS ŌöĆŌöĆ
document.querySelectorAll('.voice-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.voice-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); P.register = btn.dataset.reg;
    // Restart any held notes
    const held = [...activeVoices.keys()];
    held.forEach(n => stopNote(n));
    setTimeout(() => held.forEach(n => startNote(n)), 100);
  });
});
document.querySelectorAll('.stop-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.classList.toggle('active');
    P[btn.dataset.stop] = btn.classList.contains('active');
    if (btn.dataset.stop === 'drone' && !P.drone && droneOsc) {
      try { droneOsc.stop(); } catch(e){}
      droneOsc = null; droneGain = null;
    }
  });
});

// ŌöĆŌöĆ CANVAS KNOBS ŌöĆŌöĆ
function setupKnobs() {
  document.querySelectorAll('canvas.knob').forEach(canvas => {
    const id=canvas.id, min=parseFloat(canvas.dataset.min), max=parseFloat(canvas.dataset.max);
    let val=parseFloat(canvas.dataset.val);
    const color=canvas.dataset.color||'#40c8ff';
    const valEl=document.getElementById('v-'+id.replace('k-',''));
    function draw(){
      const ctx=canvas.getContext('2d'),w=canvas.width,h=canvas.height,cx=w/2,cy=h/2,r=w*0.38;
      ctx.clearRect(0,0,w,h);
      const sA=Math.PI*0.75,eA=Math.PI*2.25,t=(val-min)/(max-min),cA=sA+t*(eA-sA);
      ctx.beginPath();ctx.arc(cx,cy,r,sA,eA);ctx.strokeStyle='#2a2438';ctx.lineWidth=3;ctx.lineCap='round';ctx.stroke();
      ctx.beginPath();ctx.arc(cx,cy,r,sA,cA);ctx.strokeStyle=color;ctx.lineWidth=3;ctx.stroke();
      const dx=cx+r*Math.cos(cA),dy=cy+r*Math.sin(cA);
      ctx.beginPath();ctx.arc(dx,dy,2.5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
      ctx.beginPath();ctx.arc(cx,cy,3,0,Math.PI*2);ctx.fillStyle='#1e1830';ctx.fill();
      ctx.beginPath();ctx.arc(cx,cy,1.5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
    }
    let dragY=null,dragVal=null;
    canvas.addEventListener('mousedown',e=>{dragY=e.clientY;dragVal=val;e.preventDefault();});
    document.addEventListener('mousemove',e=>{
      if(dragY===null)return;
      val=Math.max(min,Math.min(max,dragVal+(dragY-e.clientY)*(max-min)/120));
      draw();onKnob(id,val,valEl);
    });
    document.addEventListener('mouseup',()=>{dragY=null;});
    draw();onKnob(id,val,valEl);
  });
}

function onKnob(id,val,el){
  const map={
    'k-reverb': v=>{P.reverb=v; el.textContent=v.toFixed(2);},
    'k-water':  v=>{P.water=v;  el.textContent=v.toFixed(2);},
    'k-tone':   v=>{P.tone=v;   el.textContent=v.toFixed(2);},
    'k-mix':    v=>{P.mix=v;    el.textContent=v.toFixed(2);},
  };
  if(map[id])map[id](val);
}

// ŌöĆŌöĆ WAVEFORM ŌöĆŌöĆ
const waveCanvas=document.getElementById('wave-canvas');
const wCtx=waveCanvas.getContext('2d');
function resizeWave(){waveCanvas.width=waveCanvas.offsetWidth;waveCanvas.height=waveCanvas.offsetHeight;}
function drawWave(){
  requestAnimationFrame(drawWave);
  const W=waveCanvas.width,H=waveCanvas.height;
  wCtx.clearRect(0,0,W,H);
  if(!analyser)return;
  const buf=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteTimeDomainData(buf);
  wCtx.strokeStyle='rgba(64,200,255,.5)';wCtx.lineWidth=1;
  wCtx.shadowColor='#40c8ff';wCtx.shadowBlur=4;
  wCtx.beginPath();
  const step=W/buf.length;
  for(let i=0;i<buf.length;i++){const x=i*step,y=(buf[i]/128-1)*(H*0.42)+H/2;i===0?wCtx.moveTo(x,y):wCtx.lineTo(x,y);}
  wCtx.stroke();wCtx.shadowBlur=0;
}

// ŌöĆŌöĆ ATMOSPHERE: water droplets rising ŌöĆŌöĆ
const atmosCanvas=document.getElementById('atmos');
const aCtx=atmosCanvas.getContext('2d');
let particles=[];
function initAtmos(){
  atmosCanvas.width=window.innerWidth;atmosCanvas.height=window.innerHeight;
  particles=Array.from({length:32},()=>({
    x:Math.random()*atmosCanvas.width,
    y:Math.random()*atmosCanvas.height,
    r:Math.random()*1.3+0.3,
    sp:Math.random()*0.2+0.04,
    o:Math.random()*0.14+0.02,
    t:Math.random()*Math.PI*2,
    // half water-blue, half bronze
    water: Math.random() > 0.4,
  }));
}
function drawAtmos(){
  requestAnimationFrame(drawAtmos);
  aCtx.clearRect(0,0,atmosCanvas.width,atmosCanvas.height);
  particles.forEach(p=>{
    p.t+=p.sp*0.016;p.x+=Math.sin(p.t*0.7)*0.3;p.y-=p.sp*0.35;
    if(p.y<-4){p.y=atmosCanvas.height+4;p.x=Math.random()*atmosCanvas.width;}
    aCtx.beginPath();aCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
    aCtx.fillStyle=p.water?`rgba(64,200,255,${p.o})`:`rgba(200,128,64,${p.o*0.7})`;
    aCtx.fill();
  });
}

// ŌöĆŌöĆ CURSOR ŌöĆŌöĆ
const cursor=document.getElementById('cursor');
document.addEventListener('mousemove',e=>{cursor.style.left=e.clientX+'px';cursor.style.top=e.clientY+'px';});

window.addEventListener('resize',()=>{resizeWave();resizeWater();initAtmos();buildKeyboard();});

// ŌöĆŌöĆ INIT ŌöĆŌöĆ
setupKnobs();
resizeWave();
resizeWater();
initAtmos();
drawAtmos();
drawWater();
drawWave();
buildPipeSVG();
buildKeyboard();
buildOctWheel();
